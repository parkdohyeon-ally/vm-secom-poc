name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install numpy pandas scikit-learn ruff pytest
      - name: Lint (pyflakes/syntax)
        run: ruff check . --select F,E9
      - name: Smoke tests
        run: pytest -q
